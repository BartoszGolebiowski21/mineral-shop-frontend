services:
  web:
    build: .
    restart: always
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - proxy-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true