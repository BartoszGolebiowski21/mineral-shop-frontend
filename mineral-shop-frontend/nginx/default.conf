server {
    listen 80;

    server_name kamykowe-rekodzielo.pl www.kamykowe-rekodzielo.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;

    server_name kamykowe-rekodzielo.pl www.kamykowe-rekodzielo.pl;

    ssl_certificate /etc/letsencrypt/live/kamykowe-rekodzielo.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kamykowe-rekodzielo.pl/privkey.pem;

    client_max_body_size 20M;

    # NEXT.JS
    location / {
        proxy_pass http://web:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }

    # DJANGO API
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MEDIA
    location /media/ {
        proxy_pass http://backend:8000/media/;
    }
}